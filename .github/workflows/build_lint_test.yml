name: Build, Lint, and Test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-C debuginfo=1"

jobs:
  build_lint_test:
    name: Rust
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          # - beta # See: https://github.com/PyO3/pyo3/issues/5580
          # - nightly # See: https://github.com/PyO3/pyo3/issues/5580

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Setup the Environment
      # ------------------------------------------------------------------
      - name: Install Rust toolchain
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}

      - name: Setup LLVM
        uses: ZhongRuoyu/setup-llvm@v0
        with:
          llvm-version: 21

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      # ------------------------------------------------------------------
      # Cache Dependencies
      # ------------------------------------------------------------------
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ------------------------------------------------------------------
      # Setup Python / uv
      # ------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ------------------------------------------------------------------
      # Run Checks
      # ------------------------------------------------------------------
      - name: Check formatting
        run: cargo fmt --verbose --check

      - name: Check licenses and advisories
        run: cargo deny --all-features check -c .cargo/deny.toml

      - name: Check build and lint errors
        # Additionally checks build on all targets
        run: cargo clippy --verbose --workspace --features python --all-targets -- -D warnings

      - name: Check each crate individually
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --no-deps --format-version=1 |
            python3 -c "import json,sys; print(\"\n\".join(p[\"name\"] for p in json.load(sys.stdin)[\"packages\"]))")
          for pkg in $pkgs; do
            echo "==> cargo check -p $pkg"
            cargo check -p "$pkg" --all-targets
          done

      - name: cargo clippy --workspace
        run: cargo clippy --workspace --features python --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --verbose --workspace --features python --no-fail-fast

      - name: Check stubs are up to date
        working-directory: crates/qudit-python
        run: |
          cargo run --bin stub_gen
          git diff --exit-code -- openqudit/

      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Run Python tests
        working-directory: crates/qudit-python
        run: uv run --reinstall-package=openqudit pytest tests/ -v
